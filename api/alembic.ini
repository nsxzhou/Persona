[alembic]
; Alembic 主配置段：
; - script_location: 迁移脚本目录（包含 env.py 与 versions/）
; - prepend_sys_path: 运行迁移前把该路径加到 sys.path，确保能 import app.*
; - sqlalchemy.url: 离线模式（--sql）默认使用的数据库 URL
;   注意：本项目的在线迁移会在 alembic/env.py 里读取 settings.database_url，
;   因此真正执行迁移时通常以环境变量/.env 配置为准
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./persona.db
; path_separator=os 表示用操作系统默认的路径分隔符（跨平台更稳）
path_separator = os

[loggers]
; 日志系统配置：定义要启用的 logger 列表
keys = root,sqlalchemy,alembic

[handlers]
; handler 定义：控制日志输出到哪里（这里输出到 stderr 控制台）
keys = console

[formatters]
; formatter 定义：控制日志输出格式
keys = generic

[logger_root]
; root logger：默认日志级别与 handler 绑定
level = WARN
handlers = console

[logger_sqlalchemy]
; SQLAlchemy 引擎日志：通常较啰嗦，默认 WARN 可避免刷屏
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
; Alembic 迁移日志：INFO 方便看到每个 revision 的执行情况
level = INFO
handlers = console
qualname = alembic

[handler_console]
; 控制台 handler：把日志写到 sys.stderr
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
; 通用格式：等级 + logger 名 + 消息
format = %(levelname)-5.5s [%(name)s] %(message)s
