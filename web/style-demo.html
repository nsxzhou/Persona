<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI 风格方向展示</title>
    <style>
        :root {
            --font-ui: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        }
        body {
            font-family: var(--font-ui);
            margin: 0;
            padding: 40px;
            background-color: #f4f4f5;
            color: #09090b;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 800;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 1. 新粗野主义 (Neo-Brutalism) */
        .style-brutalism {
            background-color: #ffffff;
            border: 4px solid #000000;
            border-radius: 0;
            padding: 30px;
            box-shadow: 8px 8px 0px #000000;
            transition: all 0.2s ease;
        }
        .style-brutalism:hover {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px #000000;
        }
        .style-brutalism h2 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-top: 0;
            border-bottom: 4px solid #000;
            padding-bottom: 10px;
        }
        .style-brutalism button {
            background-color: #FFDE59; /* 亮黄色 */
            color: #000;
            border: 3px solid #000;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            transition: all 0.1s ease;
            margin-top: 20px;
            width: 100%;
        }
        .style-brutalism button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        /* 2. 瑞士极简风 (Swiss Minimalist) */
        .style-swiss {
            background-color: #ffffff;
            border: 1px solid #000000;
            padding: 40px;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .style-swiss h2 {
            font-size: 28px;
            font-weight: 400;
            margin-top: 0;
            letter-spacing: -0.5px;
        }
        .style-swiss p {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        .style-swiss hr {
            border: none;
            border-top: 1px solid #000;
            margin: 20px 0;
        }
        .style-swiss button {
            background-color: transparent;
            color: #000;
            border: 1px solid #000;
            padding: 10px 0;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            margin-top: 20px;
            width: 100%;
        }
        .style-swiss button:hover {
            background-color: #000;
            color: #fff;
        }

        /* 3. 高对比度现代风 (High Contrast Modern) */
        .style-modern {
            background-color: #ffffff;
            border: 1px solid #e4e4e7;
            border-radius: 0;
            padding: 30px;
            /* 关键：无模糊阴影，完全依赖高对比度线条和色块 */
        }
        .style-modern h2 {
            font-size: 22px;
            font-weight: 700;
            color: #000;
            margin-top: 0;
        }
        .style-modern p {
            color: #71717a;
            font-size: 15px;
        }
        .style-modern .tag {
            display: inline-block;
            background-color: #000;
            color: #fff;
            padding: 4px 8px;
            border-radius: 0;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .style-modern button {
            background-color: #0055FF; /* 高饱和度克莱因蓝/亮蓝 */
            color: #fff;
            border: none;
            border-radius: 0;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background-color 0.2s;
        }
        .style-modern button:hover {
            background-color: #0044CC;
        }

    </style>
</head>
<body>

    <h1>UI 视觉风格探索</h1>

    <div class="container">
        <!-- 新粗野主义 -->
        <div class="style-brutalism">
            <h2>Neo-Brutalism</h2>
            <p>拒绝模糊阴影。使用纯粹的实心黑色偏移阴影、粗犷的边框以及高饱和度的色彩。风格张扬、干净利落，具有极强的视觉冲击力和“未完成”的复古数字感。</p>
            <button>应用此风格</button>
        </div>

        <!-- 瑞士极简风 -->
        <div class="style-swiss">
            <h2>Swiss Minimalist</h2>
            <hr>
            <p>绝对的克制。完全摒弃阴影和圆角，使用极细的 1px 纯黑边框。强调排版、网格对齐与大面积留白。呈现出一种高级、冷静且学术的视觉体验。</p>
            <button>应用此风格</button>
        </div>

        <!-- 高对比度现代风 -->
        <div class="style-modern">
            <span class="tag">Modern</span>
            <h2>High Contrast</h2>
            <p>保留现代 UI 的小圆角，但去除一切模糊的弥散阴影。依赖纯黑、纯白以及一个极其明亮鲜艳的主题色（如高饱和蓝色）来构建清晰、锐利的层级关系。</p>
            <button>应用此风格</button>
        </div>
    </div>

</body>
</html>
